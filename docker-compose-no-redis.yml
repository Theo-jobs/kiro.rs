services:
  kiro-rs:
    image: kiro-rs:latest
    container_name: kiro-rs
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8990:8990"
    volumes:
      - /tmp/zfsv3/nvme12/18668588631/data/my_docker/kiro-rs/config:/app/config
    environment:
      - TZ=Asia/Shanghai
      - RUST_LOG=info
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
